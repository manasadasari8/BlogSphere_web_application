{% extends "base.html" %}

{% block title %}Home - BlogSphere{% endblock %}

{% block content %}
<h2>Recent Posts</h2>
{% for post in posts %}
<div class="post">
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <small>By {{ post.author.username }} on {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
</div>
{% endfor %}
{% endblock %}
