{% extends "base.html" %}

{% block title %}Authentication - BlogSphere{% endblock %}

{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-card" aria-label="Authentication card">
    <h2 class="auth-title">Sign In</h2>

    <form id="login-form" class="auth-form" method="POST" action="{{ url_for('login') }}" {% if active_form != 'login' %}style="display: none;"{% endif %}>
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" required autocomplete="username">

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password">

        <button type="submit">Sign In</button>
        <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Create one</a></p>
    </form>

    <form id="register-form" class="auth-form" method="POST" action="{{ url_for('register') }}" {% if active_form != 'register' %}style="display: none;"{% endif %}>
        <label for="register-username">Username</label>
        <input type="text" id="register-username" name="username" required autocomplete="username">

        <label for="register-email">Email</label>
        <input type="email" id="register-email" name="email" required autocomplete="email">

        <label for="register-password">Password</label>
        <input type="password" id="register-password" name="password" required autocomplete="new-password">

        <button type="submit">Create Account</button>
        <p class="toggle-text">Already have an account? <a href="#" id="show-login">Sign in</a></p>
    </form>
</div>

<script>
    (function () {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegister = document.getElementById('show-register');
        const showLogin = document.getElementById('show-login');
        const title = document.querySelector('.auth-title');

        function showForm(mode) {
            const isRegister = mode === 'register';
            loginForm.style.display = isRegister ? 'none' : 'block';
            registerForm.style.display = isRegister ? 'block' : 'none';
            title.textContent = isRegister ? 'Create Account' : 'Sign In';

            // Update URL hash without reloading to keep deep links consistent.
            if (history.replaceState) {
                history.replaceState(null, '', isRegister ? '#register' : '#login');
            }
        }

        showRegister.addEventListener('click', function (event) {
            event.preventDefault();
            showForm('register');
        });

        showLogin.addEventListener('click', function (event) {
            event.preventDefault();
            showForm('login');
        });

        // Initialize based on server-side hint or hash.
        const active = '{{ active_form }}';
        const hash = window.location.hash.replace('#', '');
        if (hash === 'register' || active === 'register') {
            showForm('register');
        } else {
            showForm('login');
        }
    })();
</script>
{% endblock %}
